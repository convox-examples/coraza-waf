# =============================================================================
# Convox Platform Exclusions
# =============================================================================
# These exclusions suppress false positives caused by normal Kubernetes and
# Convox platform behavior. They are loaded before the CRS rules via config.d.
#
# Note: Use single-line format for SecRule directives. Backslash line
# continuations can fail silently depending on file encoding and whitespace.

# Rule 920350: Host header is a numeric IP address
# Kubernetes health checks (liveness/readiness probes) hit the pod IP directly,
# so the Host header is always a numeric IP like "10.1.105.186:8080".
SecRule REQUEST_HEADERS:User-Agent "@rx kube-probe" "id:1000001,phase:1,pass,nolog,ctl:ruleRemoveById=920350"

# Paranoia level: explicitly set blocking and detection paranoia levels.
# The PARANOIA and EXECUTING_PARANOIA env vars in the coraza-crs-docker image
# are broken for CRS v4 — the entrypoint sed patterns reference old v3 variable
# names (tx.paranoia_level, tx.executing_paranoia_level) that no longer exist.
# This SecAction sets the correct CRS v4 variables directly.
# Change the values below to adjust — do NOT rely on PARANOIA env var.
SecAction "id:1000002,phase:1,nolog,pass,t:none,setvar:tx.blocking_paranoia_level=1,setvar:tx.detection_paranoia_level=1"
