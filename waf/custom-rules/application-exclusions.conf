# =============================================================================
# Application-Specific Rule Exclusions
# =============================================================================
# Add your own exclusions here for false positives specific to your application.
# These are loaded AFTER the CRS rules via rules.d.
#
# Common patterns are shown below as commented-out examples. Uncomment and
# adjust to match your application's needs.
#
# TIP: Run in DetectionOnly mode first, watch the logs for rule IDs that fire
# on legitimate traffic, then add exclusions here for those rules.

# -----------------------------------------------------------------------------
# Example 1: Exclude a rule for a specific URL path
# Use this when a specific endpoint legitimately triggers a rule.
# For instance, a search endpoint that accepts complex query strings:
# -----------------------------------------------------------------------------
# SecRule REQUEST_URI "@beginsWith /api/search" \
#     "id:1000100,\
#     phase:1,\
#     pass,\
#     nolog,\
#     ctl:ruleRemoveById=942100"

# -----------------------------------------------------------------------------
# Example 2: Exclude a rule for a specific parameter
# Use this when a form field or API parameter contains content that looks like
# an attack but is expected. For instance, a rich text editor that sends HTML:
# -----------------------------------------------------------------------------
# SecRule REQUEST_URI "@beginsWith /api/posts" \
#     "id:1000101,\
#     phase:1,\
#     pass,\
#     nolog,\
#     ctl:ruleRemoveTargetById=941100;ARGS:body,\
#     ctl:ruleRemoveTargetById=941160;ARGS:body"

# -----------------------------------------------------------------------------
# Example 3: Blanket-remove a rule entirely
# Use this as a last resort when a rule causes widespread false positives
# across your entire application. Prefer targeted exclusions above.
# -----------------------------------------------------------------------------
# SecRuleRemoveById 920300
