# =============================================================================
# Application-Specific Rule Exclusions
# =============================================================================
# Add your own exclusions here for false positives specific to your application.
# These are loaded AFTER the CRS rules via rules.d.
#
# TIP: Run in DetectionOnly mode first, watch the logs for rule IDs that fire
# on legitimate traffic, then add exclusions here for those rules.
#
# IMPORTANT: Use single-line format for SecRule directives. Backslash line
# continuations can fail silently in Coraza depending on file encoding.

# -----------------------------------------------------------------------------
# Common: Exclude third-party cookies from SQL injection / RCE rules
# CloudFront signed cookies, Google Analytics (_ga), and Cloudflare (_cf*)
# cookies contain base64, timestamps, and special characters that trigger
# SQL injection (942xxx) and RCE (932xxx) rules as false positives.
# -----------------------------------------------------------------------------
# SecRule REQUEST_URI "@rx .*" "id:1000100,phase:1,pass,nolog,ctl:ruleRemoveTargetById=942420;REQUEST_COOKIES,ctl:ruleRemoveTargetById=942421;REQUEST_COOKIES,ctl:ruleRemoveTargetById=942421;REQUEST_COOKIES_NAMES,ctl:ruleRemoveTargetById=932240;REQUEST_COOKIES"

# -----------------------------------------------------------------------------
# Common: Exclude a specific URL path from a rule
# Use when an endpoint legitimately triggers a rule (e.g. a search endpoint
# that accepts complex query strings, or a socket.io endpoint):
# -----------------------------------------------------------------------------
# SecRule REQUEST_URI "@beginsWith /api/search" "id:1000101,phase:1,pass,nolog,ctl:ruleRemoveById=942100"
# SecRule REQUEST_URI "@beginsWith /socket.io/" "id:1000102,phase:1,pass,nolog,ctl:ruleRemoveById=921180"

# -----------------------------------------------------------------------------
# Common: Exclude a specific parameter from a rule
# Use when a form field contains content that looks like an attack (e.g. a
# rich text editor that sends HTML in request body):
# -----------------------------------------------------------------------------
# SecRule REQUEST_URI "@beginsWith /api/posts" "id:1000103,phase:1,pass,nolog,ctl:ruleRemoveTargetById=941100;ARGS:body,ctl:ruleRemoveTargetById=941160;ARGS:body"

# -----------------------------------------------------------------------------
# Last resort: Blanket-remove a rule entirely
# Only use when a rule causes widespread false positives across your app.
# Prefer the targeted exclusions above.
# -----------------------------------------------------------------------------
# SecRuleRemoveById 920300
